<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helia, in her songs.</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<header class="hero">

<h1>Helia, in her songs.</h1>

<p class="quote">
Every song here holds a piece of me.
</p>

<p class="subtitle">
Find my soul in my favorite songs.<br>
Hope u like it!
</p>

<div class="search-box">
<input
type="text"
id="searchInput"
placeholder="Search songs...">
</div>
  <div id="songsContainer"></div>
  <script src="script.js"></script>

</header>

<main>

<section
id="songsContainer"
class="songs">

<!-- Songs will appear here -->

</section>

</main>

<div
id="miniPlayer"
class="mini-player hidden">

<img
id="cover"
src=""
alt="cover">

<div class="player-info">

<h3 id="songTitle">
Nothing Playing
</h3>

<p id="artistName">
Select a song
</p>

</div>

<audio
id="audioPlayer"
controls>
</audio>

</div>

<script src="script.js"></script>

</body>
</html>
